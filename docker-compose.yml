version: '3.8'

services:
  voice-translator:
    build:
      context: .
      dockerfile: Dockerfile
    image: voice-translator:latest
    container_name: voice-translator-app
    ports:
      - "5876:5876"
    environment:
      - NODE_ENV=production
      - PORT=5876
      - GOOGLE_TRANSLATE_API_KEY=${GOOGLE_TRANSLATE_API_KEY}
      # 高品質（premium 文字）與 Live 即時語音翻譯需要此 key（與 Google 翻譯那把不同）
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ADMIN_USERNAME=${ADMIN_USERNAME}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-*}
      - FRONTEND_URL=*
    volumes:
      # Persist SQLite usage + admins DB across container rebuilds
      - ./server-data:/app/server/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5876/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
