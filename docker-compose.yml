version: '3.8'

services:
  voice-translator:
    build:
      context: .
      dockerfile: Dockerfile
    image: voice-translator:latest
    container_name: voice-translator-app
    ports:
      - "5876:5876"
    environment:
      - NODE_ENV=production
      - PORT=5876
      - GOOGLE_TRANSLATE_API_KEY=${GOOGLE_TRANSLATE_API_KEY}
      - FRONTEND_URL=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5876/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
